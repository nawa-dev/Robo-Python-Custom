<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROBO-PYTHON</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-4NYTPP2TN9"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-4NYTPP2TN9");

      // Helper for GA4 events
      function trackEvent(action, category, label) {
        if (typeof gtag === "function") {
          gtag("event", action, {
            event_category: category,
            event_label: label,
          });
          console.log(`[Tracking] ${action} - ${category}:${label}`);
        }
      }
    </script>
    <link rel="icon" type="image/png" sizes="512x512" href="src/img/icon.png" />
    <link rel="stylesheet" href="style/base.css" />
    <link rel="stylesheet" href="style/toolbar.css" />
    <link rel="stylesheet" href="style/buttons.css" />
    <link rel="stylesheet" href="style/dropdown.css" />
    <link rel="stylesheet" href="style/editor.css" />
    <link rel="stylesheet" href="style/resizer.css" />
    <link rel="stylesheet" href="style/canvas.css" />
    <link rel="stylesheet" href="style/controls.css" />
    <link rel="stylesheet" href="style/modal.css" />
    <link rel="stylesheet" href="style/sensors.css" />
    <link rel="stylesheet" href="style/input-buttons.css" />
    <link rel="stylesheet" href="style/tabs.css" />

    <link rel="stylesheet" href="src/cdn_file/fontawesome/css/all.min.css" />
    <script src="src/cdn_file/skulpt/skulpt.min.js"></script>
    <script src="src/cdn_file/skulpt/skulpt-stdlib.js"></script>
    <script src="src/cdn_file/monaco-editor/min/vs/loader.js"></script>

    <!-- Main modules (load in order) -->
    <script src="src/variableGlobal.js" defer></script>
    <script src="src/physics.js" defer></script>
    <script src="src/canvas.js" defer></script>
    <script src="src/sensors.js" defer></script>
    <script src="src/executor.js" defer></script>
    <script src="src/storage.js" defer></script>
    <script src="src/script.js" defer></script>
    <script src="src/config.js" defer></script>
  </head>
  <body>
    <header class="toolbar">
      <div class="logo-section">
        <div class="image-logo">
          <img src="src/img/icon.png" alt="logo" />
        </div>
        <div class="logo">
          <span class="logo-robo">ROBO</span>-<span class="logo-python"
            >PYTHON</span
          >
        </div>
      </div>

      <div class="actions">
        <div class="dropdown">
          <button class="btn-tool dropbtn">
            <i class="fas fa-file-alt"></i> File
            <i class="fas fa-caret-down"></i>
          </button>

          <div class="dropdown-content">
            <a
              href="javascript:void(0)"
              onclick="
                newProject();
                trackEvent('click', 'FileMenu', 'New');
              "
            >
              <i class="fas fa-file"></i> New
            </a>
            <a
              href="javascript:void(0)"
              onclick="
                openProject();
                trackEvent('click', 'FileMenu', 'Open');
              "
            >
              <i class="fas fa-folder-open"></i> Open
            </a>
            <a
              href="javascript:void(0)"
              onclick="
                saveProjectAs();
                trackEvent('click', 'FileMenu', 'Export');
              "
            >
              <i class="fas fa-download"></i> Export
            </a>
            <!-- <div class="separator"></div> -->
            <!-- <div class="separator"></div> -->
            <div class="dropdown-submenu">
              <a href="javascript:void(0)" class="submenu-trigger">
                <i class="fas fa-lightbulb"></i> Example
                <i
                  class="fas fa-caret-right"
                  style="float: right; margin-top: 4px"
                ></i>
              </a>
              <div class="dropdown-content submenu-content" id="example-list">
                <!-- Examples will be loaded here -->
                <a
                  href="javascript:void(0)"
                  style="color: #999; pointer-events: none"
                  >Loading...</a
                >
              </div>
            </div>
          </div>
        </div>
        <div class="separator"></div>
        <button
          id="run-stop-btn"
          class="btn-run"
          onclick="
            toggleRunStop();
            trackEvent('click', 'Toolbar', 'RunStop');
          "
        >
          <i class="fas fa-play"></i> Run
        </button>
        <button
          id="reset-btn"
          class="btn-reset"
          onclick="
            resetPosition();
            trackEvent('click', 'Toolbar', 'Reset');
          "
        >
          <i class="fas fa-undo"></i> Reset
        </button>
        <div class="separator"></div>

        <!-- <button
          id="robot-settings-btn"
          class="btn-tool"
          onclick="
            openRobotSettings();
            trackEvent('click', 'Toolbar', 'SensorSettings');
          "
        >
          <i class="fa-solid fa-gear"></i> Sensor
        </button> -->

        <div class="separator"></div>

        <div class="angle-control">
          <span>Angle:</span>
          <div class="angle-buttons">
            <button
              class="btn-angle"
              onclick="rotateRobot(-45)"
              title="Rotate Left 45°"
            >
              <i class="fas fa-undo"></i>
            </button>
            <button
              class="btn-angle"
              onclick="rotateRobot(45)"
              title="Rotate Right 45°"
            >
              <i class="fas fa-redo"></i>
            </button>
          </div>
        </div>

        <div class="separator"></div>

        <div class="canvas-settings">
          <span>Canvas: </span>
          <input
            type="number"
            id="canvas-w"
            value="800"
            onchange="updateCanvasSize()"
          />
          <span>x</span>
          <input
            type="number"
            id="canvas-h"
            value="600"
            onchange="updateCanvasSize()"
          />

          <div class="separator"></div>

          <!-- Map selector -->
          <label for="map-select">Map:</label>
          <select
            id="map-select"
            onchange="
              handleMapSelectChange(this);
              trackEvent('change', 'Settings', 'MapSelect:' + this.value);
            "
          >
            <option value="default">Default Map</option>
            <option value="current" id="current-map-option" data-filename="">
              No map loaded
            </option>
            <option value="upload">Upload My Map...</option>
          </select>

          <!-- hidden file input used for uploads -->
          <input
            type="file"
            id="map-upload"
            accept="image/*"
            style="display: none"
            onchange="loadMapFile(this)"
          />
        </div>
      </div>

      <div class="github-container">
        <a
          href="https://github.com/nawa-dev/Robo-Python"
          class="github-button"
          target="_blank"
        >
          <i class="fa-brands fa-github"></i>
          <span>GITHUB</span>
        </a>
      </div>
    </header>

    <main class="container">
      <section class="editor-pane">
        <!-- Tab Headers -->
        <div class="editor-tabs">
          <button
            id="tab-btn-code"
            class="tab-btn active"
            onclick="switchTab('code')"
          >
            <i class="fas fa-code"></i> Code
          </button>
          <button
            id="tab-btn-settings"
            class="tab-btn"
            onclick="switchTab('settings')"
          >
            <i class="fa-solid fa-gear"></i> Robot Setting
          </button>
        </div>

        <!-- Code Tab -->
        <div id="tab-code" class="tab-content active">
          <div id="monaco-container"></div>

          <div class="h-resizer" id="h-drag-resizer"></div>

          <div class="console-pane">
            <div class="console-header">
              <span>Console</span>

              <button
                onclick="
                  clearConsole();
                  trackEvent('click', 'Console', 'Clear');
                "
                style="padding: 2px 8px; font-size: 10px"
              >
                Clear
              </button>
            </div>
            <div id="console-output"></div>
          </div>
        </div>

        <!-- Robot Settings Tab -->
        <div id="tab-settings" class="tab-content">
          <!-- Top Row: Preview + Device Selector -->
          <div class="settings-top-row">
            <!-- Top Left: Preview -->
            <div class="settings-preview-box">
              <div class="settings-preview-header">
                <span>Preview</span>
                <div style="display: flex; gap: 8px; align-items: center">
                  <label
                    style="
                      font-size: 11px;
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      color: #aaa;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="show-rays-checkbox"
                      checked
                      onchange="toggleSensorRays(this.checked)"
                    />
                    Ray
                  </label>
                  <label
                    style="
                      font-size: 11px;
                      display: flex;
                      align-items: center;
                      gap: 4px;
                      color: #aaa;
                      cursor: pointer;
                    "
                  >
                    <input
                      type="checkbox"
                      id="show-grips-checkbox"
                      checked
                      onchange="toggleGripPreview(this.checked)"
                    />
                    Grip
                  </label>
                </div>
              </div>
              <div id="sensor-preview" class="sensor-preview">
                <svg
                  id="preview-svg"
                  viewBox="-25 -25 100 100"
                  width="160"
                  height="160"
                >
                  <rect
                    x="0"
                    y="0"
                    width="50"
                    height="50"
                    fill="#ff4757"
                    stroke="#333"
                    stroke-width="1"
                  />
                  <rect
                    id="motor-left"
                    x="20"
                    y="-10"
                    width="10"
                    height="15"
                    fill="#ff"
                    stroke="#333"
                    stroke-width="1"
                  />
                  <rect
                    id="motor-right"
                    x="20"
                    y="45"
                    width="10"
                    height="15"
                    fill="#ff"
                    stroke="#333"
                    stroke-width="1"
                  />
                  <text
                    x="25"
                    y="-23"
                    text-anchor="middle"
                    fill="white"
                    font-size="8"
                    font-weight="bold"
                    transform="rotate(90)"
                  >
                    ROBOT
                  </text>
                </svg>
              </div>
            </div>

            <!-- Vertical Resizer -->
            <div class="settings-v-resizer" id="settings-v-resizer"></div>

            <!-- Top Right: Device Selector -->
            <div class="settings-device-selector">
              <div class="device-selector-title">Devices</div>
              <button
                id="dev-btn-wheel"
                class="device-btn"
                onclick="selectDevice('wheel')"
              >
                <i class="fas fa-circle-notch"></i> WHEEL
              </button>
              <button
                id="dev-btn-ultrasonic"
                class="device-btn"
                onclick="selectDevice('ultrasonic')"
              >
                <i class="fas fa-wifi"></i> Ultrasonic
              </button>
              <button
                id="dev-btn-light"
                class="device-btn active"
                onclick="selectDevice('light')"
              >
                <i class="fas fa-lightbulb"></i> Light Sensor
              </button>
              <button
                id="dev-btn-grip"
                class="device-btn"
                onclick="selectDevice('grip')"
              >
                <i class="fas fa-hand-rock"></i> Grip
              </button>
            </div>
          </div>

          <!-- Bottom Row: Device Config Panel -->
          <div class="settings-bottom-row">
            <!-- Wheel Panel -->
            <div id="panel-wheel" class="device-panel" style="display: none">
              <div class="device-panel-header">
                <span>WHEEL</span>
              </div>
              <div class="device-panel-body">
                <div class="wheel-position-row">
                  <label>Wheel Position:</label>
                  <input
                    type="number"
                    id="motorPos-input"
                    min="-20"
                    max="20"
                    value="0"
                    onchange="handleMotorPosition(this.value)"
                    placeholder="0"
                  />
                </div>
              </div>
            </div>

            <!-- Ultrasonic Panel -->
            <div
              id="panel-ultrasonic"
              class="device-panel"
              style="display: none"
            >
              <div class="device-panel-header">
                <span>ULTRASONIC</span>
                <button
                  class="btn-panel-add"
                  onclick="addSensorToList('ultrasonic')"
                >
                  ADD
                </button>
              </div>
              <div
                id="list-ultrasonic"
                class="device-panel-body sensors-container"
              ></div>
            </div>

            <!-- Light Sensor Panel -->
            <div id="panel-light" class="device-panel" style="display: block">
              <div class="device-panel-header">
                <span>LIGHT SENSOR</span>
                <button
                  class="btn-panel-add"
                  onclick="addSensorToList('light')"
                >
                  ADD
                </button>
              </div>
              <div
                id="list-light"
                class="device-panel-body sensors-container"
              ></div>
            </div>

            <!-- Grip Panel -->
            <div id="panel-grip" class="device-panel" style="display: none">
              <div class="device-panel-header">
                <span
                  >GRIP
                  <span
                    id="grip-count-label"
                    style="font-weight: 400; font-size: 12px; color: #aaa"
                  ></span
                ></span>
                <button
                  class="btn-panel-add btn-panel-add-grip"
                  onclick="addGrip()"
                >
                  ADD
                </button>
              </div>
              <div
                id="list-grip"
                class="device-panel-body sensors-container"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <div class="resizer" id="drag-resizer"></div>

      <section class="canvas-pane">
        <div class="button-sensor-container">
          <span class="sensor-label">Input Buttons:</span>
          <div class="button-sensor-group">
            <div class="button-div">
              <label for="" style="margin: 0px">SW1</label>
              <button
                id="button1"
                class="sensor-btn"
                title="Button 1"
                onclick="trackEvent('click', 'Input', 'SW1')"
              >
                <img src="src/img/button.png" alt="btn1" />
              </button>
            </div>
            <div class="button-div">
              <label for="" style="margin: 0px">SW2</label>
              <button
                id="button2"
                class="sensor-btn"
                title="Button 2"
                onclick="trackEvent('click', 'Input', 'SW2')"
              >
                <img src="src/img/button.png" alt="btn2" />
              </button>
            </div>
            <div class="button-div">
              <label for="" style="margin: 0px">SW3</label>
              <button
                id="button3"
                class="sensor-btn"
                title="Button 3"
                onclick="trackEvent('click', 'Input', 'SW3')"
              >
                <img src="src/img/button.png" alt="btn3" />
              </button>
            </div>
          </div>

          <span class="sensor-label" style="margin-left: 15px">Objects:</span>
          <div class="button-sensor-group" id="object-palette">
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#e74c3c"
              title="Red Object"
              style="background-color: #e74c3c"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#3498db"
              title="Blue Object"
              style="background-color: #3498db"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#2ecc71"
              title="Green Object"
              style="background-color: #2ecc71"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#f1c40f"
              title="Yellow Object"
              style="background-color: #f1c40f"
            ></div>
          </div>
        </div>
        <div id="canvas-area">
          <div
            id="robot"
            style="left: 100px; top: 100px; transform: rotate(0deg)"
          >
            <div class="wheel w-l"></div>
            <span
              style="
                font-size: 8px;
                display: inline-block;
                transform: rotate(90deg) translate(0px, 0px);
              "
              >ROBOT</span
            >
            <div class="wheel w-r"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Robot Settings Modal -->
    <div id="robot-settings-modal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Sensor</h2>
          <button class="modal-close" onclick="closeRobotSettings()">✕</button>
        </div>

        <div class="modal-body">
          <div class="sensors-section">
            <div class="sensor-preview-container">
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  margin-bottom: 10px;
                "
              >
                <h4 style="margin: 0">Sensor Preview</h4>
                <label
                  style="
                    font-size: 12px;
                    display: flex;
                    align-items: center;
                    gap: 5px;
                    color: #ccc;
                    cursor: pointer;
                  "
                >
                  <input
                    type="checkbox"
                    id="show-rays-checkbox"
                    checked
                    onchange="toggleSensorRays(this.checked)"
                  />
                  Ultrasonic Line
                </label>
              </div>
              <div id="sensor-preview" class="sensor-preview">
                <svg
                  id="preview-svg"
                  viewBox="-25 -25 100 100"
                  width="200"
                  height="200"
                >
                  <rect
                    x="0"
                    y="0"
                    width="50"
                    height="50"
                    fill="#ff4757"
                    stroke="#333"
                    stroke-width="1"
                  />

                  <rect
                    id="motor-left"
                    x="20"
                    y="-10"
                    width="10"
                    height="15"
                    fill="#ff"
                    stroke="#333"
                    stroke-width="1"
                  />

                  <rect
                    id="motor-right"
                    x="20"
                    y="45"
                    width="10"
                    height="15"
                    fill="#ff"
                    stroke="#333"
                    stroke-width="1"
                  />

                  <text
                    x="25"
                    y="28"
                    text-anchor="middle"
                    fill="white"
                    font-size="8"
                    font-weight="bold"
                    transform="rotate(90 25 25)"
                  >
                    ROBOT
                  </text>
                </svg>
              </div>
            </div>
            <div class="sensors-right-panel">
              <div class="motorPosition-container">
                <h4>Wheel Position</h4>
                <div class="motorPosition-input">
                  <input
                    type="number"
                    id="motorPos-input"
                    min="-20"
                    max="20"
                    value="0"
                    onchange="handleMotorPosition(this.value)"
                    placeholder="0°"
                  />
                </div>
              </div>

              <div class="sensors-list">
                <div class="add-sensor-controls">
                  <button
                    class="btn-add-sensor"
                    onclick="addSensorToList('light')"
                  >
                    + Light Sensor
                  </button>
                  <button
                    class="btn-add-sensor"
                    style="background-color: #0984e3"
                    onclick="addSensorToList('ultrasonic')"
                  >
                    + Ultrasonic
                  </button>
                </div>

                <div id="sensors-container" class="sensors-container"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-primary" onclick="closeRobotSettings()">
            Done
          </button>
        </div>
      </div>
    </div>

    <input
      type="file"
      id="file-input"
      accept=".json"
      style="display: none"
      onchange="loadProject(this)"
    />
    <script>
      // เมื่อโหลดหน้าเว็บเสร็จ ให้ดึงข้อมูลจาก Storage มาใช้ทันที
      window.addEventListener("DOMContentLoaded", () => {
        // รอสักครู่เพื่อให้ Editor โหลดเสร็จ (ถ้ามี Delay)
        setTimeout(() => {
          loadFromWebStorage();
          if (typeof loadExampleMenu === "function") {
            loadExampleMenu();
          }
        }, 100);
      });
    </script>
    <div class="version-overlay"></div>
  </body>
</html>
