<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROBO-PYTHON</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-4NYTPP2TN9"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-4NYTPP2TN9");

      // Helper for GA4 events
      function trackEvent(action, category, label) {
        if (typeof gtag === "function") {
          gtag("event", action, {
            event_category: category,
            event_label: label,
          });
          console.log(`[Tracking] ${action} - ${category}:${label}`);
        }
      }
    </script>
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="src/assets/img/icon.png"
    />
    <link rel="stylesheet" href="style/base.css" />
    <link rel="stylesheet" href="style/toolbar.css" />
    <link rel="stylesheet" href="style/buttons.css" />
    <link rel="stylesheet" href="style/dropdown.css" />
    <link rel="stylesheet" href="style/editor.css" />
    <link rel="stylesheet" href="style/resizer.css" />
    <link rel="stylesheet" href="style/canvas.css" />
    <link rel="stylesheet" href="style/controls.css" />
    <link rel="stylesheet" href="style/modal.css" />
    <link rel="stylesheet" href="style/sensors.css" />
    <link rel="stylesheet" href="style/input-buttons.css" />
    <link rel="stylesheet" href="style/tabs.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"
    />
    <link rel="stylesheet" href="style/tour-style.css" />

    <link rel="stylesheet" href="src/lib/fontawesome/css/all.min.css" />
    <script src="src/lib/skulpt/skulpt.min.js"></script>
    <script src="src/lib/skulpt/skulpt-stdlib.js"></script>
    <script src="src/lib/monaco-editor/min/vs/loader.js"></script>

    <!-- Main modules (load in order) -->
    <script src="src/core/variableGlobal.js" defer></script>
    <script src="src/utils/i18n.js" defer></script>
    <script src="src/ui/ui-manager.js" defer></script>
    <script src="src/ui/editor-controller.js" defer></script>
    <script src="src/ui/interaction-handler.js" defer></script>
    <script src="src/core/physics.js" defer></script>
    <script src="src/core/canvas.js" defer></script>
    <script src="src/sensors/sensors-manager.js" defer></script>
    <script src="src/core/executor.js" defer></script>
    <script src="src/utils/storage.js" defer></script>
    <script src="src/ui/tour.js" defer></script>
    <script src="src/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
    <script src="src/utils/config.js" defer></script>
    <script src="src/utils/sensorLoader.js" defer></script>
  </head>
  <body>
    <header class="toolbar">
      <div class="logo-section">
        <div class="image-logo">
          <img src="src/assets/img/icon.png" alt="logo" />
        </div>
        <div class="logo">
          <span class="logo-robo">ROBO</span>-<span class="logo-python"
            >PYTHON</span
          >
        </div>
      </div>

      <div class="actions">
        <div class="dropdown">
          <button class="btn-tool dropbtn" data-i18n="toolbar.file">
            <i class="fas fa-file-alt"></i> File
            <i class="fas fa-caret-down"></i>
          </button>

          <div class="dropdown-content">
            <a
              href="javascript:void(0)"
              onclick="
                newProject();
                trackEvent('click', 'FileMenu', 'New');
              "
              data-i18n="toolbar.new"
            >
              <i class="fas fa-file"></i> New
            </a>
            <a
              href="javascript:void(0)"
              onclick="
                openProject();
                trackEvent('click', 'FileMenu', 'Open');
              "
              data-i18n="toolbar.open"
            >
              <i class="fas fa-folder-open"></i> Open
            </a>
            <a
              href="javascript:void(0)"
              onclick="
                saveProjectAs();
                trackEvent('click', 'FileMenu', 'Export');
              "
              data-i18n="toolbar.export"
            >
              <i class="fas fa-download"></i> Export
            </a>
            <!-- <div class="separator"></div> -->
            <!-- <div class="separator"></div> -->
            <div class="dropdown-submenu">
              <a
                href="javascript:void(0)"
                class="submenu-trigger"
                data-i18n="toolbar.example"
              >
                <i class="fas fa-lightbulb"></i> Example
                <i
                  class="fas fa-caret-right"
                  style="float: right; margin-top: 4px"
                ></i>
              </a>
              <div class="dropdown-content submenu-content" id="example-list">
                <!-- Examples will be loaded here -->
                <a
                  href="javascript:void(0)"
                  style="color: #999; pointer-events: none"
                  data-i18n="toolbar.loading"
                  >Loading...</a
                >
              </div>
            </div>
          </div>
        </div>
        <div class="separator"></div>
        <button
          id="run-stop-btn"
          class="btn-run"
          onclick="
            toggleRunStop();
            trackEvent('click', 'Toolbar', 'RunStop');
          "
          data-i18n="toolbar.run"
        >
          <i class="fas fa-play"></i> Run
        </button>
        <button
          id="reset-btn"
          class="btn-reset"
          onclick="
            resetPosition();
            trackEvent('click', 'Toolbar', 'Reset');
          "
          data-i18n="toolbar.reset"
        >
          <i class="fas fa-undo"></i> Reset
        </button>
        <div class="separator"></div>

        <!-- <button
          id="robot-settings-btn"
          class="btn-tool"
          onclick="
            openRobotSettings();
            trackEvent('click', 'Toolbar', 'SensorSettings');
          "
        >
          <i class="fa-solid fa-gear"></i> Sensor
        </button> -->

        <div class="separator"></div>

        <div class="angle-control">
          <span data-i18n="toolbar.angle">Angle:</span>
          <div class="angle-buttons">
            <button
              class="btn-angle"
              onclick="rotateRobot(-45)"
              title="Rotate Left 45°"
              data-i18n-title="toolbar.rotate_left"
            >
              <i class="fas fa-undo"></i>
            </button>
            <button
              class="btn-angle"
              onclick="rotateRobot(45)"
              title="Rotate Right 45°"
              data-i18n-title="toolbar.rotate_right"
            >
              <i class="fas fa-redo"></i>
            </button>
          </div>
        </div>

        <div class="separator"></div>

        <div class="canvas-settings">
          <span data-i18n="toolbar.canvas">Canvas: </span>
          <input
            type="number"
            id="canvas-w"
            value="800"
            onchange="updateCanvasSize()"
          />
          <span>x</span>
          <input
            type="number"
            id="canvas-h"
            value="600"
            onchange="updateCanvasSize()"
          />

          <div class="separator"></div>

          <!-- Map selector -->
          <label for="map-select" data-i18n="toolbar.map">Map:</label>
          <select
            id="map-select"
            onchange="
              handleMapSelectChange(this);
              trackEvent('change', 'Settings', 'MapSelect:' + this.value);
            "
          >
            <option value="default" data-i18n="toolbar.default_map">
              Default Map
            </option>
            <option
              value="current"
              id="current-map-option"
              data-filename=""
              data-i18n="toolbar.no_map"
            >
              No map loaded
            </option>
            <option value="upload" data-i18n="toolbar.upload_map">
              Upload My Map...
            </option>
          </select>

          <!-- hidden file input used for uploads -->
          <input
            type="file"
            id="map-upload"
            accept="image/*"
            style="display: none"
            onchange="loadMapFile(this)"
          />
        </div>
      </div>

      <div class="github-container">
        <a
          href="https://github.com/nawa-dev/Robo-Python"
          class="github-button"
          target="_blank"
        >
          <i class="fa-brands fa-github"></i>
          <span data-i18n="toolbar.github">GITHUB</span>
        </a>
        <div class="lang-switcher">
          <button
            id="lang-th"
            class="lang-btn active"
            onclick="i18n.setLanguage('th')"
          >
            TH
          </button>
          <button
            id="lang-en"
            class="lang-btn"
            onclick="i18n.setLanguage('en')"
          >
            EN
          </button>
        </div>
        <button
          id="tour-btn"
          class="btn-tour-icon"
          onclick="
            if (typeof startTour === 'function') startTour();
            trackEvent('click', 'Toolbar', 'Tour');
          "
          title="Start Product Tour"
          data-i18n-title="toolbar.tour"
        >
          <i class="fas fa-question-circle" style="font-size: 20px"></i>
        </button>
      </div>
    </header>

    <main class="container">
      <section class="editor-pane">
        <!-- Tab Headers -->
        <div class="editor-tabs">
          <button
            id="tab-btn-code"
            class="tab-btn active"
            onclick="switchTab('code')"
            data-i18n="tabs.code"
          >
            <i class="fas fa-code"></i> Code
          </button>
          <button
            id="tab-btn-settings"
            class="tab-btn"
            onclick="switchTab('settings')"
            data-i18n="tabs.settings"
          >
            <i class="fa-solid fa-gear"></i> Robot Setting
          </button>
        </div>

        <!-- Code Tab -->
        <div id="tab-code" class="tab-content active">
          <div id="monaco-container"></div>

          <div class="h-resizer" id="h-drag-resizer"></div>

          <div class="console-pane">
            <div class="console-header">
              <span data-i18n="console.title">Console</span>

              <button
                onclick="
                  clearConsole();
                  trackEvent('click', 'Console', 'Clear');
                "
                style="padding: 2px 8px; font-size: 10px"
                data-i18n="console.clear"
              >
                Clear
              </button>
            </div>
            <div id="console-output"></div>
          </div>
        </div>

        <!-- Robot Settings Tab -->
        <div id="tab-settings" class="tab-content">
          <!-- Top Row: Preview + Device Selector -->
          <div class="settings-top-row">
            <!-- Top Left: Preview -->
            <div class="settings-preview-box">
              <div class="settings-preview-header">
                <span data-i18n="settings.preview">Preview</span>
                <div
                  id="preview-toggles"
                  style="display: flex; gap: 8px; align-items: center"
                >
                  <!-- Dynamic toggles injected here -->
                </div>
              </div>
              <div id="sensor-preview" class="sensor-preview">
                <svg
                  id="preview-svg"
                  viewBox="-50 -50 150 150"
                  width="160"
                  height="160"
                >
                  <rect
                    id="robot-preview-body-rect"
                    x="0"
                    y="0"
                    width="50"
                    height="50"
                    fill="#ff4757"
                    stroke="#333"
                    stroke-width="1"
                  />
                  <rect
                    id="motor-left"
                    x="21"
                    y="-8"
                    width="8"
                    height="14"
                    fill="#000"
                    stroke="#333"
                    stroke-width="1"
                    rx="2"
                  ></rect>
                  <rect
                    id="motor-right"
                    x="21"
                    y="44"
                    width="8"
                    height="14"
                    fill="#000"
                    stroke="#333"
                    stroke-width="1"
                    rx="2"
                  ></rect>
                  <!-- Back Wheels -->
                  <rect
                    id="motor-left-back"
                    x="21"
                    y="-8"
                    width="8"
                    height="14"
                    fill="#000"
                    stroke="#333"
                    stroke-width="1"
                    rx="2"
                    style="display: none"
                  ></rect>
                  <rect
                    id="motor-right-back"
                    x="21"
                    y="44"
                    width="8"
                    height="14"
                    fill="#000"
                    stroke="#333"
                    stroke-width="1"
                    rx="2"
                    style="display: none"
                  ></rect>
                  <text
                    id="robot-preview-text"
                    x="0"
                    y="0"
                    text-anchor="middle"
                    dominant-baseline="middle"
                    fill="white"
                    font-size="8"
                    font-weight="bold"
                    transform="rotate(90)"
                  >
                    ROBOT
                  </text>
                </svg>
              </div>
            </div>

            <!-- Vertical Resizer -->
            <div class="settings-v-resizer" id="settings-v-resizer"></div>

            <!-- Top Right: Device Selector -->
            <div class="settings-device-selector" id="dynamic-device-selector">
              <div class="device-selector-title" data-i18n="settings.devices">
                Devices
              </div>
              <!-- Buttons injected dynamically -->
            </div>
          </div>

          <!-- Bottom Row: Device Config Panel -->
          <div class="settings-bottom-row" id="dynamic-device-panels">
            <!-- Panels injected dynamically -->
          </div>
        </div>
      </section>

      <div class="resizer" id="drag-resizer"></div>

      <section class="canvas-pane">
        <div class="button-sensor-container">
          <span class="sensor-label" data-i18n="inputs.buttons"
            >Input Buttons:</span
          >
          <div class="button-sensor-group">
            <div class="button-div">
              <label for="" style="margin: 0px">SW1</label>
              <button
                id="button1"
                class="sensor-btn"
                title="Button 1"
                onclick="trackEvent('click', 'Input', 'SW1')"
              >
                <img src="src/assets/img/button.png" alt="btn1" />
              </button>
            </div>
            <div class="button-div">
              <label for="" style="margin: 0px">SW2</label>
              <button
                id="button2"
                class="sensor-btn"
                title="Button 2"
                onclick="trackEvent('click', 'Input', 'SW2')"
              >
                <img src="src/assets/img/button.png" alt="btn2" />
              </button>
            </div>
            <div class="button-div">
              <label for="" style="margin: 0px">SW3</label>
              <button
                id="button3"
                class="sensor-btn"
                title="Button 3"
                onclick="trackEvent('click', 'Input', 'SW3')"
              >
                <img src="src/assets/img/button.png" alt="btn3" />
              </button>
            </div>
          </div>

          <span
            class="sensor-label"
            style="margin-left: 15px"
            data-i18n="inputs.objects"
            >Objects:</span
          >
          <div class="button-sensor-group" id="object-palette">
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#e74c3c"
              title="Red Object"
              style="background-color: #e74c3c"
              data-i18n-title="inputs.red_obj"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#3498db"
              title="Blue Object"
              style="background-color: #3498db"
              data-i18n-title="inputs.blue_obj"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#2ecc71"
              title="Green Object"
              style="background-color: #2ecc71"
              data-i18n-title="inputs.green_obj"
            ></div>
            <div
              class="draggable-obj"
              draggable="true"
              data-color="#f1c40f"
              title="Yellow Object"
              style="background-color: #f1c40f"
              data-i18n-title="inputs.yellow_obj"
            ></div>
          </div>

          <!-- Right-aligned View Dropdown -->
          <div class="dropdown view-dropdown" style="margin-left: auto">
            <button
              class="sensor-btn dropbtn"
              title="View Options"
              data-i18n-title="view_menu.title"
            >
              <i class="fas fa-ellipsis-v"></i>
            </button>
            <div class="dropdown-content view-menu-content">
              <a
                href="javascript:void(0)"
                onclick="zoomIn()"
                data-i18n="view_menu.zoom_in"
                ><i class="fas fa-search-plus"></i> Zoom In</a
              >
              <a
                href="javascript:void(0)"
                onclick="zoomOut()"
                data-i18n="view_menu.zoom_out"
                ><i class="fas fa-search-minus"></i> Zoom Out</a
              >
              <a
                href="javascript:void(0)"
                id="menu-drag-mode"
                onclick="toggleDragMode()"
                data-i18n="view_menu.drag_mode"
                ><i class="fas fa-arrows-alt"></i> Drag Mode</a
              >
              <a
                href="javascript:void(0)"
                onclick="resetView()"
                data-i18n="view_menu.reset_view"
                ><i class="fas fa-sync-alt"></i> Reset View</a
              >
            </div>
          </div>
        </div>
        <!-- Close button-sensor-container -->

        <div id="canvas-viewport">
          <div id="canvas-area">
            <div
              id="robot"
              style="left: 400px; top: 300px; transform: rotate(0deg)"
            >
              <div id="robot-bg"></div>
              <div class="wheel w-l"></div>
              <div class="wheel w-l-back" style="display: none"></div>
              <span
                style="
                  font-size: 8px;
                  display: inline-block;
                  transform: rotate(90deg) translate(0px, 0px);
                "
                >ROBOT</span
              >
              <div class="wheel w-r"></div>
              <div class="wheel w-r-back" style="display: none"></div>
            </div>
            <!-- Global SVG layer for sensors and rays -->
            <svg
              id="sensors-svg"
              style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 10;
              "
            ></svg>
          </div>
        </div>
      </section>
    </main>

    <input
      type="file"
      id="file-input"
      accept=".json"
      style="display: none"
      onchange="loadProject(this)"
    />
    <script>
      // เมื่อโหลดหน้าเว็บเสร็จ ให้ดึงข้อมูลจาก Storage มาใช้ทันที
      window.addEventListener("DOMContentLoaded", () => {
        // รอสักครู่เพื่อให้ Editor โหลดเสร็จ (ถ้ามี Delay)
        setTimeout(() => {
          loadFromWebStorage();
          if (typeof loadExampleMenu === "function") {
            loadExampleMenu();
          }
        }, 100);
      });
    </script>
    <div class="version-overlay"></div>
  </body>
</html>
