<div class="wheel-position-row" style="margin-bottom: 8px;">
  <label>Wheels:</label>
  <select id="wheelCount-select" onchange="window.SensorRegistry['{TYPE}'].updateValue(null, 'wheelCount', this.value)">
    <option value="2">2 Wheels</option>
    <option value="4">4 Wheels</option>
  </select>
</div>
<div class="wheel-position-row">
  <label>Wheel Position:</label>
  <input type="number" id="motorPos-input" min="-20" max="20" value="0" onchange="window.SensorRegistry['{TYPE}'].updateValue(null, 'motorPos', this.value)" placeholder="0" />
</div>
